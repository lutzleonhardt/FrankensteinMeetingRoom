<div class="header" [style.--chip-color]="chipColor()" [style.--chip-bg]="chipBg()">
  <span class="title-row">
    <span class="title">{{ title() }}</span>
    @if (standaloneUrl(); as url) {
      <a class="external"
         [href]="url"
         target="_blank"
         rel="noopener noreferrer"
         title="Öffne das Remote als eigenständige App"
         aria-label="Öffne das Remote als eigenständige App">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    }
  </span>
  <span class="chip">
    <span class="logo" [innerHTML]="logoHtml()"></span>
    <span class="label">{{ frameworkLabel() }}</span>
  </span>
</div>
