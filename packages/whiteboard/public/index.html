<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Whiteboard (standalone)</title>
    <link rel="stylesheet" href="main.css" />
    <style>
      body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: system-ui, -apple-system, sans-serif; }
      .standalone-header {
        height: 40px;
        padding: 0 0.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        box-sizing: border-box;
      }
      .standalone-header .title { font-size: 0.875rem; font-weight: 600; color: #1f2937; }
      .standalone-header .chip {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        height: 22px;
        padding: 0 0.5rem;
        border: 1px solid #61DAFB;
        color: #61DAFB;
        background: #fff;
        border-radius: 999px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .standalone-header .chip svg { display: block; }
      #root { flex: 1; min-height: 0; }
    </style>
  </head>
  <body>
    <header class="standalone-header">
      <span class="title">Whiteboard</span>
      <span class="chip">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="-11.5 -10.23 23 20.46" width="14" height="14" aria-hidden="true">
          <circle r="2.05" fill="currentColor"/>
          <g fill="none" stroke="currentColor" stroke-width="1">
            <ellipse rx="11" ry="4.2"/>
            <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
            <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
          </g>
        </svg>
        React
      </span>
    </header>
    <div id="root"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
